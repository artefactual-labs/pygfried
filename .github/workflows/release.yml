name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in stable X.Y.Z format.
        required: true
        type: string
      ref:
        description: Git ref or commit SHA to release from.
        required: false
        default: main
        type: string

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.validate.outputs.package_version }}
      tag_name: ${{ steps.validate.outputs.tag_name }}
      release_sha: ${{ steps.validate.outputs.release_sha }}
      tag_exists: ${{ steps.validate.outputs.tag_exists }}
      pypi_exists: ${{ steps.validate.outputs.pypi_exists }}
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Validate release inputs
        id: validate
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: main
          PACKAGE_NAME: pygfried
        run: bash ./.github/scripts/validate-release-inputs.sh

  build:
    name: Build release artifacts
    needs: validate
    uses: ./.github/workflows/_build.yml
    with:
      ref: ${{ needs.validate.outputs.release_sha }}
      package_version: ${{ needs.validate.outputs.package_version }}
      upload_artifacts: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.validate.outputs.release_sha }}
          fetch-depth: 0
      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: all_build_artifacts/sdist
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheel-*
          path: all_build_artifacts/wheels
      - name: Prepare packages for publishing
        shell: bash
        run: |
          mkdir -p dist
          find all_build_artifacts/sdist -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find all_build_artifacts/wheels -type f -name '*.whl' -exec cp {} dist/ \;
          echo "Contents of dist/ before publishing:"
          ls -R dist
      - name: Upload distribution packages to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
      - name: Create GitHub release and tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag_name }}
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG_NAME} already exists; skipping creation."
            exit 0
          fi
          gh release create "${TAG_NAME}" --target "${RELEASE_SHA}" --title "${TAG_NAME}" --generate-notes
