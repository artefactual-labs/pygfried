name: Build

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build and test.
        required: true
        type: string
      package_version:
        description: Exact PEP 440 version to inject during the build.
        required: false
        default: ""
        type: string
      upload_artifacts:
        description: Upload built distributions as workflow artifacts.
        required: false
        default: false
        type: boolean

env:
  # Fail if uv.lock would need to change.
  UV_LOCKED: "1"
  # Use the Python provided by actions/setup-python from PATH.
  UV_SYSTEM_PYTHON: "1"

jobs:
  lint:
    name: Lint and format checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - name: Sync dev dependencies
        run: uv sync --only-dev --no-install-project
      - name: Run checks
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    env:
      PRETEND_VERSION: ${{ inputs.package_version }}
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - name: Sync dev dependencies
        run: uv sync --only-dev --no-install-project
      - name: Build sdist
        shell: bash
        run: |
          if [[ -n "${PRETEND_VERSION}" ]]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION="${PRETEND_VERSION}"
          fi
          uv build --sdist
      - name: Check sdist
        run: uv run --no-sync python -m twine check --strict dist/*.tar.gz
      - name: Upload sdist artifact
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sdist
          path: dist/*.tar.gz

  build:
    name: Build ${{ matrix.name }} (py${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: linux
            runner: ubuntu-24.04
            python-version: "3.10"
            manylinux_image: quay.io/pypa/manylinux2014_x86_64:latest
            go_tarball: linux-amd64
            artifact_name: python-wheel-linux-x86_64-py3.10
            macosx_deployment_target: ""
          - name: linux-aarch64
            platform: linux
            runner: ubuntu-24.04-arm
            python-version: "3.10"
            manylinux_image: quay.io/pypa/manylinux2014_aarch64:latest
            go_tarball: linux-arm64
            artifact_name: python-wheel-linux-aarch64-py3.10
            macosx_deployment_target: ""
          - name: macos-arm64
            platform: macos
            runner: macos-14
            python-version: "3.10"
            manylinux_image: ""
            go_tarball: ""
            artifact_name: python-wheel-macos-arm64-py3.10
            macosx_deployment_target: "11.0"
          - name: windows-x86_64
            platform: windows
            runner: windows-latest
            python-version: "3.10"
            manylinux_image: ""
            go_tarball: ""
            artifact_name: python-wheel-windows-x86_64-py3.10
            macosx_deployment_target: ""
    env:
      PRETEND_VERSION: ${{ inputs.package_version }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # Linux installs Go inside the manylinux container; macOS and Windows
      # build on the host runner and need Go provisioned here.
      - name: Set up Go
        if: matrix.platform != 'linux'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Sync dev dependencies
        run: uv sync --only-dev --no-install-project
      - name: Build wheel (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          GO_VERSION="$(awk '/^go / { print $2; exit }' go.mod)"
          DOCKER_ENV=()
          if [[ -n "${PRETEND_VERSION}" ]]; then
            DOCKER_ENV+=(--env "SETUPTOOLS_SCM_PRETEND_VERSION=${PRETEND_VERSION}")
          fi
          docker run --rm \
            --volume "${PWD}:/src:ro" \
            --volume "${PWD}/dist:/dist:rw" \
            --user "$(id -u):$(id -g)" \
            "${DOCKER_ENV[@]}" \
            "${{ matrix.manylinux_image }}" \
            bash -o pipefail -euxc '
              cp -a /src/. /tmp/src
              cd /tmp
              curl --silent --location "https://go.dev/dl/go'"${GO_VERSION}"'.${{ matrix.go_tarball }}.tar.gz" | tar -xz
              export PATH="/tmp/go/bin:$PATH" HOME=/tmp GOCACHE=/tmp/go-cache
              /opt/python/cp310-cp310/bin/pip wheel --no-deps --wheel-dir /tmp /tmp/src
              auditwheel repair /tmp/*.whl --wheel-dir /dist
            '
          uv run --no-sync python -m twine check --strict dist/*.whl
      - name: Build wheel (macOS/Windows)
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          if [[ -n "${PRETEND_VERSION}" ]]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION="${PRETEND_VERSION}"
          fi
          # Use the matrix interpreter for the isolated build environment.
          uv build --wheel --python "${{ matrix.python-version }}"
          uv run --no-sync python -m twine check --strict dist/*.whl
      - name: Test wheel installation (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $wheels = Get-ChildItem dist/*.whl
          python -m venv test_env
          .\\test_env\\Scripts\\Activate.ps1
          python -m pip install pytest
          python -m pip install $wheels[0].FullName
          python -m pytest
          deactivate
      - name: Test wheel installation (macOS/Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          python -m venv test_env
          source test_env/bin/activate
          python -m pip install pytest
          python -m pip install dist/*.whl
          python -m pytest
          deactivate
      - name: Smoke test wheel with uvx
        shell: bash
        run: ./.github/scripts/smoke-install.sh dist/*.whl "${{ matrix.python-version }}"
      - name: Upload package artifacts
        if: inputs.upload_artifacts || matrix.platform == 'windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl

  windows_abi3_compat:
    name: Test Windows abi3 wheel (py${{ matrix.python-version }})
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Download Windows wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-windows-x86_64-py3.10
          path: dist
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Test wheel installation
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          python -m venv test_env
          .\\test_env\\Scripts\\Activate.ps1
          python -m pip install pytest
          python -m pip install $wheel.FullName
          python -m pytest
          deactivate
